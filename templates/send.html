{% extends "base.html" %}

{% block title %}
Send Money | K Wallet
{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h3>Send Money</h3>
                </div>
                <div class="card-body">
                    <form id="sendForm">
                        <div class="mb-3">
                            <label class="form-label">Recipient Account Number</label>
                            <input type="text" class="form-control" id="receiver" placeholder="e.g., KW000001" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Amount (KES)</label>
                            <input type="number" class="form-control" id="amount" placeholder="0.00" step="0.01" min="1" required>
                        </div>
                        
                        <button type="submit" class="btn btn-primary w-100">Send Money</button>
                    </form>
                    
                    <div id="message" class="mt-3"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('sendForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const data = {
            receiver: document.getElementById('receiver').value,
            amount: parseFloat(document.getElementById('amount').value)
        };
        
        fetch('/send', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        })
        .then(r => r.json())
        .then(data => {
            const msgDiv = document.getElementById('message');
            if (data.error) {
                msgDiv.innerHTML = '<div class="alert alert-danger">' + data.error + '</div>';
            } else {
                msgDiv.innerHTML = '<div class="alert alert-success">' + data.message + '</div>';
                document.getElementById('sendForm').reset();
            }
        })
        .catch(err => {
            document.getElementById('message').innerHTML = '<div class="alert alert-danger">Error sending money</div>';
            console.error('Error:', err);
        });
    });
</script>
{% endblock %}
